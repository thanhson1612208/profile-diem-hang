(function(){
    var toast=document.createElement('div');
    toast.style.cssText='position:fixed;top:-90px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(6,8,7,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:11px;box-shadow:0 16px 48px rgba(0,0,0,.7);backdrop-filter:blur(20px);transition:top .45s cubic-bezier(.34,1.2,.64,1);min-width:230px;max-width:320px;font-family:Outfit,sans-serif;white-space:nowrap;';
    var icon=document.createElement('span');icon.style.cssText='font-size:1rem;flex-shrink:0;';
    var txt=document.createElement('div');
    var t1=document.createElement('div');t1.style.cssText='font-size:.8rem;font-weight:600;color:#fff;';
    var t2=document.createElement('div');t2.style.cssText='font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px;font-family:Geist Mono,monospace;';
    txt.appendChild(t1);txt.appendChild(t2);toast.appendChild(icon);toast.appendChild(txt);
    var TT=null;
    window.showToast=function(type){
        clearTimeout(TT);
        if(type==='loading'){icon.textContent='⏳';t1.textContent='Not ready yet';t2.textContent='Please wait...';}
        else if(type==='copied'){icon.textContent='✦';t1.textContent='Copied';t2.textContent='Username copied.';}
        else{icon.textContent='◆';t1.textContent='Access denied';t2.textContent='Developer tools are disabled.';}
        toast.style.top='20px';TT=setTimeout(function(){toast.style.top='-90px';},3000);
    };
    document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(toast);});
    document.addEventListener('contextmenu',function(e){e.preventDefault();showToast('block');});
    document.addEventListener('keydown',function(e){
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C','K'].includes(e.key.toUpperCase()))||(e.ctrlKey&&e.key.toUpperCase()==='U')){
            e.preventDefault();e.stopPropagation();showToast('block');return false;
        }
        if(e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key.toLowerCase()==='p'){e.preventDefault();return false;}
    });
    var _devOpen=false,_threshold=160;
    var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
    if(!isMobile){
        setInterval(function(){
            var wD=window.outerWidth-window.innerWidth;
            var hD=window.outerHeight-window.innerHeight;
            if((wD>_threshold||hD>_threshold)&&!_devOpen){_devOpen=true;showToast('block');}
            else if(wD<=_threshold&&hD<=_threshold){_devOpen=false;}
        },900);
        setInterval(function(){
            var d=new Date();
            (function(){}).constructor('debugger')();
            if(new Date()-d>300&&!_devOpen){_devOpen=true;showToast('block');}
        },2500);
    }
    Object.defineProperty(window,'_phantom',{get:function(){showToast('block');}});
    window.addEventListener('devtoolschange',function(e){if(e.detail.open)showToast('block');});
})();
</script>

<script>
// Logic Load Background Video/Image
window.applyBackground = function(customUrl) {
    var bg = document.getElementById('bg');
    var existingMedia = document.getElementById('bg-media');
    var filterStyle = 'filter:brightness(.52) saturate(.68) blur(' + BACKGROUND_BLUR + 'px); transform:' + (BACKGROUND_BLUR > 0 ? 'scale(1.1)' : 'scale(1)') + ';';

    if (existingMedia && existingMedia.dataset.src === (customUrl || 'default')) {
        existingMedia.style.filter = 'brightness(.52) saturate(.68) blur(' + BACKGROUND_BLUR + 'px)';
        existingMedia.style.transform = BACKGROUND_BLUR > 0 ? 'scale(1.1)' : 'scale(1)';
        return;
    }
    if (existingMedia) existingMedia.remove();

    var BG_STYLE_BASE = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.4s ease, filter 0.5s ease, transform 0.5s ease;pointer-events:none;z-index:0;';

    if (customUrl) {
        var isVideo = customUrl.match(/\.(mp4|webm|ogg)$/i) || customUrl.startsWith('data:video');
        if (isVideo) {
            var v = document.createElement('video');
            v.id = 'bg-media';
            v.dataset.src = customUrl;
            v.autoplay = true; v.loop = true; v.muted = true;
            v.playsInline = true; v.setAttribute('playsinline','');
            v.preload = 'auto';
            v.style.cssText = BG_STYLE_BASE + filterStyle;
            var show = function() { this.style.opacity = '1'; if(this.play) this.play().catch(function(){}); };
            v.oncanplay = show;
            v.onloadeddata = show;
            v.src = customUrl;
            bg.appendChild(v);
        } else {
            var img = document.createElement('img');
            img.id = 'bg-media';
            img.dataset.src = customUrl;
            img.style.cssText = BG_STYLE_BASE + filterStyle;
            img.onload = function() { this.style.opacity = '1'; };
            img.src = customUrl;
            bg.appendChild(img);
        }
        return;
    }

    // Không có customUrl -> dùng gradient mặc định (không tự tìm file local)
};
window.applyBackground(); // Gọi mặc định ban đầu
</script>

// CANVAS LOGIC
const cc=document.getElementById('cc'),ctx2=cc.getContext('2d');
cc.width=innerWidth;cc.height=innerHeight;
addEventListener('resize',()=>{cc.width=innerWidth;cc.height=innerHeight;});
const pts=[];
class P{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-.5)*.7;this.vy=(Math.random()-.5)*.7;this.l=1;this.sz=Math.random()*1.6+.3;}up(){this.x+=this.vx;this.y+=this.vy;this.l-=.024;this.sz=Math.max(0,this.sz-.015);}dr(){ctx2.globalAlpha=this.l*.3;ctx2.fillStyle='#fff';ctx2.beginPath();ctx2.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx2.fill();}}
document.addEventListener('mousemove',e=>{if(pts.length<80)pts.push(new P(e.clientX,e.clientY));});

// Kéo thanh nhạc (drag seek)
(function(){
    const pbar=document.getElementById('pbar');
    let dragging=false;
    function seek(e){
        const r=pbar.getBoundingClientRect();
        const x=Math.max(0,Math.min(e.clientX-r.left,r.width));
        const pct=x/r.width;
        if(audio.duration&&isFinite(audio.duration)){audio.currentTime=pct*audio.duration;}
        document.getElementById('pfill').style.width=(pct*100)+'%';
    }
    pbar.addEventListener('mousedown',function(e){dragging=true;seek(e);});
    document.addEventListener('mousemove',function(e){if(dragging)seek(e);});
    document.addEventListener('mouseup',function(){dragging=false;});
    pbar.addEventListener('touchstart',function(e){dragging=true;seek(e.touches[0]);},{passive:true});
    document.addEventListener('touchmove',function(e){if(dragging)seek(e.touches[0]);},{passive:true});
    document.addEventListener('touchend',function(){dragging=false;});
})();
document.getElementById('prev').addEventListener('click',pPrev);
document.getElementById('next').addEventListener('click',pNext);

// API CALLS & UI UPDATE
async function incViews(){try{const r=await fetch('/api/card/view',{method:'POST',headers:{'Content-Type':'application/json'}});if(r.ok){const d=await r.json();return d.views||0;}}catch{}return null;}
function animCount(el,tgt){let c=0;const step=Math.ceil(tgt/60);const t=setInterval(()=>{c+=step;if(c>=tgt){el.textContent=tgt.toLocaleString();clearInterval(t);}else el.textContent=Math.floor(c).toLocaleString();},18);}

async function fetchPresence(){
    try{
        // Gọi API Presence và Lượt View song song để giảm một nửa thời gian chờ
        const [presenceRes, viewCount] = await Promise.all([
            fetch(`/api/presence/${USER_ID}`).then(r => r.json()),
            incViews()
        ]);
        if(!presenceRes.error) await updateUI(presenceRes);
        if(viewCount!==null) { animCount(document.getElementById('views'),viewCount); }
        // Fetch guild nếu có config
        fetchGuild();
        // Re-apply style after DOM is populated
        try {
            const cfgRes = await fetch('/api/config');
            if (cfgRes.ok) { const cfg = await cfgRes.json(); applyStyleConfig(cfg.STYLE); }
        } catch(e) {}
    }catch(e){console.error(e);}
    finally{
        apiReady=true;
            const hint=document.getElementById('ov-hint');
            if(hint){
                hint.textContent='[ click to start ]';
            }
            overlay.style.pointerEvents='auto';
            overlay.style.cursor='pointer';
            overlay.addEventListener('click', dismissOverlay, { once: true });
    }
}

// GUILD CARD
let GUILD_INVITE = '';
async function fetchGuild() {
    if (!GUILD_INVITE) { document.getElementById('guild-card').style.display='none'; checkAboutRow(); return; }
    try {
        const res = await fetch('/api/guild/' + encodeURIComponent(GUILD_INVITE));
        const data = await res.json();
        if (data.success && data.guild) {
            const g = data.guild;
            document.getElementById('guild-icon').src = g.icon || '';
            document.getElementById('guild-name').textContent = g.name || '—';
            document.getElementById('guild-online').textContent = g.online.toLocaleString();
            document.getElementById('guild-members').textContent = g.members.toLocaleString();
            document.getElementById('guild-join').href = 'https://discord.gg/' + g.invite_code;
            document.getElementById('guild-card').style.display = 'flex';
        } else {
            document.getElementById('guild-card').style.display = 'none';
        }
    } catch(e) { console.warn('guild fetch error:', e); document.getElementById('guild-card').style.display='none'; }
    checkAboutRow();
}

async function updateUI(p){
    if(p.avatar||AVATAR_OVERRIDE){
        document.getElementById('avatar').src=AVATAR_OVERRIDE||p.avatar;
    }
    if(p.avatar){
        var prAv=document.getElementById('pr-av');
        prAv.src=p.avatar;
        prAv.onload=function(){
            document.getElementById('discord-card').style.display='flex';
            checkAboutRow();
        };
    }

    function showDecWhenReady(el, url){
        if(!el)return;
        if(!url){ el.style.display='none'; return; }
        el.style.display='none';
        el.onload =function(){this.style.display='block';};
        el.onerror=function(){this.style.display='none';};
        el.src=url;
    }
    showDecWhenReady(document.getElementById('avdec'), AVATAR_DEC_OVERRIDE || p.avatar_decoration?.url);
    showDecWhenReady(document.getElementById('pr-avdec'), p.avatar_decoration?.url);

    const unEl=document.getElementById('uname');
    const heroName=NAME_OVERRIDE||p.display_name||p.username||'User';
    // Always set name text first
    unEl.textContent=heroName;
    unEl.dataset.username=p.username||'';
    // Only replaceWith if no effect will run (replaceWith destroys spans)
    var willApplyEffect = window._layoutConfig && window._layoutConfig.nameEffect && window._layoutConfig.nameEffect !== 'none';
    if(!willApplyEffect) {
        unEl.replaceWith(unEl.cloneNode(true));
        document.getElementById('uname').addEventListener('click',function(){
            const u=this.dataset.username;if(!u)return;
            if(navigator.clipboard?.writeText)navigator.clipboard.writeText(u).then(()=>showToast('copied')).catch(()=>{});
        });
    } else {
        unEl.onclick=function(){
            const u=this.dataset.username;if(!u)return;
            if(navigator.clipboard?.writeText)navigator.clipboard.writeText(u).then(()=>showToast('copied')).catch(()=>{});
        };
    }
    // Apply name effect after text is set (only once)
    if(willApplyEffect && !_nameEffectActive) {
        applyNameEffect(window._layoutConfig.nameEffect);
    }
    document.getElementById('pr-name').textContent=p.display_name||p.username||heroName;

    const clanTag=p.clan?.tag||p.clan_tag;
    if(clanTag){
        const clanEl=document.getElementById('pr-clan');
        const cbEl=document.getElementById('pr-clan-badge');
        const ctEl=document.getElementById('pr-clan-tag');
        const cbUrl=p.clan_badge||p.clan?.badge||'';
        if(cbUrl){ cbEl.src=cbUrl; cbEl.style.display=''; cbEl.onerror=function(){this.style.display='none';}; }
        else{cbEl.style.display='none';}
        ctEl.textContent=clanTag;
        clanEl.style.display='inline-flex';
    }

    const sm={online:'s-on',idle:'s-id',dnd:'s-dnd',offline:'s-off'};
    const sc=sm[p.status]||'s-off';
    document.getElementById('status').className='hero-status '+sc;
    document.getElementById('pr-dot').className='ic-dot '+sc;

    // Set status image
    const statusImgMap = {online:'online.png', idle:'idle.png', dnd:'dnd.png', offline:'offline.png'};
    const statusImgFile = statusImgMap[p.status] || 'offline.png';
    const heroStatusImg = document.getElementById('status-img');
    const prDotImg = document.getElementById('pr-dot-img');
    const imgUrl = '/visual/media/badges/' + statusImgFile;
    heroStatusImg.src = imgUrl; heroStatusImg.style.display = 'block';
    prDotImg.src = imgUrl; prDotImg.style.display = 'block';

    const stM={online:'online',idle:'currently idle',dnd:'do not disturb',offline:'offline'};
    document.getElementById('pr-state').textContent=stM[p.status]||'offline';

    const bios=(CUSTOM_BIOS && CUSTOM_BIOS.length > 0) ? CUSTOM_BIOS : [' '];
    let bi=0,bci=0,bdl=false;
    const bel=document.getElementById('bio');
    if(window.bioTimer) clearTimeout(window.bioTimer);
    function tick(){
        const t=bios[bi]||'';bel.textContent=bdl?t.substring(0,--bci):t.substring(0,++bci);
        if(!bdl&&bci===t.length){bdl=true;window.bioTimer=setTimeout(tick,2400);return;}
        if(bdl&&bci===0){bdl=false;bi=(bi+1)%bios.length;window.bioTimer=setTimeout(tick,500);return;}
        window.bioTimer=setTimeout(tick,bdl?26:52);
    }
    tick();

    const infoBadges=document.getElementById('discord-badges');
    infoBadges.innerHTML='';
    function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    try{
        const bRes=await fetch('/api/badges');
        if(bRes.ok){
            const bData=await bRes.json();
            if(bData.success&&bData.badges?.length){
                bData.badges.forEach(b=>{
                    const lbl=escAttr(b.label||b.key||'');
                    const desc=b.description&&b.description!==b.label
                        ? `<div class="dbadge-tip-label">${escAttr(b.label)}</div><div class="dbadge-tip-desc">${escAttr(b.description)}</div>`
                        : `<div class="dbadge-tip-label">${lbl}</div>`;
                    const w=document.createElement('div'); w.className='dbadge-wrap';
                    w.innerHTML=`<img class="dbadge" src="${escAttr(b.icon)}" alt="${lbl}" onerror="this.style.display='none'"><div class="dbadge-tip">${desc}</div>`;
                    infoBadges.appendChild(w);
                });
            }
        }
    }catch(e){console.warn('badges:',e);}

    const acts=p.activities||[];
    const sec=document.getElementById('acts');
    const dotsContainer=document.getElementById('acts-dots');
    sec.innerHTML='';
    dotsContainer.innerHTML='';

    if(acts.length > 0){
        let actIdx = 0;

        acts.forEach((a, i) => {
            const card = mkAct(a);
            if (acts.length > 1) {
                card.classList.add(i === 0 ? 'act-visible' : 'act-hidden');
            }
            sec.appendChild(card);
        });

        if (acts.length > 1) {
            dotsContainer.style.display = 'flex';

            // Nút lên
            const btnUp = document.createElement('div');
            btnUp.className = 'act-nav';
            btnUp.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>';
            dotsContainer.appendChild(btnUp);

            // Dots
            acts.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'act-dot' + (i === 0 ? ' active' : '');
                dotsContainer.appendChild(dot);
            });

            // Nút xuống
            const btnDown = document.createElement('div');
            btnDown.className = 'act-nav';
            btnDown.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';
            dotsContainer.appendChild(btnDown);

            const dots = dotsContainer.querySelectorAll('.act-dot');
            const cards = sec.querySelectorAll('.acard');

            function updateActUI() {
                cards.forEach((c, i) => {
                    if (i === actIdx) { c.classList.add('act-visible'); c.classList.remove('act-hidden'); }
                    else { c.classList.add('act-hidden'); c.classList.remove('act-visible'); }
                });
                dots.forEach((d, i) => {
                    if (i === actIdx) d.classList.add('active');
                    else d.classList.remove('active');
                });
            }

            function goToAct(idx) {
                actIdx = Math.max(0, Math.min(idx, acts.length - 1));
                updateActUI();
            }

            btnUp.addEventListener('click', (e) => { e.stopPropagation(); goToAct(actIdx - 1); });
            btnDown.addEventListener('click', (e) => { e.stopPropagation(); goToAct(actIdx + 1); });

            // Lăn chuột trên presence card để chuyển activity
            const presenceCard = document.getElementById('presence-card');
            let wheelTimeout = null;
            presenceCard.addEventListener('wheel', (e) => {
                if (acts.length <= 1) return;
                e.preventDefault();
                if (wheelTimeout) return;
                wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 300);
                if (e.deltaY > 0) goToAct(actIdx + 1);
                else if (e.deltaY < 0) goToAct(actIdx - 1);
            }, { passive: false });

            dots.forEach((dot, idx) => {
                dot.addEventListener('click', (e) => { e.stopPropagation(); goToAct(idx); });
            });
        } else {
            dotsContainer.style.display = 'none';
        }

        document.getElementById('presence-card').style.display='flex';
    } else {
        document.getElementById('presence-card').style.display='none';
    }
    checkAboutRow();
}

function checkAboutRow(){
    const row=document.getElementById('about-row');
    const dc=document.getElementById('discord-card');
    const pc=document.getElementById('presence-card');
    const gc=document.getElementById('guild-card');
    const dcVis=dc.style.display!=='none';
    const pcVis=pc.style.display!=='none';
    const gcVis=gc.style.display!=='none';
    const visCount = (dcVis?1:0) + (pcVis?1:0) + (gcVis?1:0);
    if(visCount === 0){ row.style.display='none'; return; }
    row.style.display='grid';
    if(visCount === 1){ row.classList.add('solo'); }
    else { row.classList.remove('solo'); }

    // Guild card: nếu có RPC thì span 2 rows, nếu không thì chỉ 1 row (bằng với discord)
    // Chỉ áp dụng trên desktop (>720px)
    if (gcVis) {
        if (window.innerWidth > 720) {
            gc.style.gridRow = pcVis ? '1 / -1' : '1';
        } else {
            gc.style.gridRow = '';
        }
    }
}

function mkAct(a){
    const c=document.createElement('div');c.className='acard';
    const lI=a.assets?.large_image,sI=a.assets?.small_image,aI=a.app_icon;
    const musicApps = ['spotify', 'apple music', 'youtube music', 'soundcloud', 'tidal', 'music'];
    const isMusicApp = a.type === 2 || musicApps.some(n => a.name?.toLowerCase().includes(n));
    let tL = isMusicApp ? `Listening to ${a.name || ''}` : 'Playing';
    let name = isMusicApp ? (a.details || a.name || '') : (a.name || '');
    let det = isMusicApp ? (a.state || '') : (a.details || '');
    let sub = isMusicApp ? (a.assets?.large_text || '') : (a.state || '');
    let iH='';
    if(lI){iH=`<div class="aicon-wrap"><img src="${lI}" class="aicon-large" onerror="this.src='${aI||''}'"> ${sI?`<img src="${sI}" class="aicon-small" onerror="this.style.display='none'">`:''}  </div>`;}
    else if(aI){iH=`<img src="${aI}" class="aicon-app" onerror="this.style.display='none'">`;}
    c.innerHTML=`${iH}<div class="ainfo"><div class="act-type">${tL}</div><div class="aname">${name}</div>${det?`<div class="adetails">${det}</div>`:''}${sub?`<div class="adetails" style="opacity:.5;margin-top:1px">${sub}</div>`:''}</div>`;
    return c;
}

const overlay=document.getElementById('overlay');
function dismissOverlay(){
    const spinner=overlay.querySelector('.ov-spinner');
    const spinner2=overlay.querySelector('.ov-spinner-2');
    const hint=document.getElementById('ov-hint');

function applyStyleConfig(style) {
    if (!style) style = { nameColor: '#ffffff', bioColor: 'rgba(255,255,255,0.55)', iconColor: 'rgba(255,255,255,0.2)', nameGlow: false };
    
    const nameColor = style.nameColor || '#ffffff';
    const bioColor = style.bioColor || 'rgba(255,255,255,0.55)';
    const iconColor = style.iconColor || 'rgba(255,255,255,0.2)';
    const nameGlow = style.nameGlow || false;
    
    // Apply to default layout elements (skip color if text effect is active)
    const heroName = document.querySelector('.hero-name');
    if (heroName && !heroName.classList.contains('text-rainbow') && !heroName.classList.contains('text-shine') && !heroName.classList.contains('text-glitch')) {
        heroName.style.color = nameColor;
    }
    
    const bioText = document.querySelector('.bio-text');
    if (bioText) bioText.style.color = bioColor;
    
    document.querySelectorAll('#hero .slink').forEach(el => el.style.color = iconColor);
    
    // Glow effect
    if (nameGlow) {
        const glowShadow = '0 0 16px ' + nameColor;
        if (heroName) heroName.style.textShadow = glowShadow;
    } else {
        if (heroName) heroName.style.textShadow = '';
    }
}

function applyLayout(layout) {
    if (!layout) return;

    // Màu sắc
    if (layout.nameColor) {
        const nameEl = document.querySelector('.hero-name');
        if (nameEl) nameEl.style.color = layout.nameColor;
    }
    if (layout.descriptionColor) {
        const bioEl = document.querySelector('.bio-text');
        if (bioEl) bioEl.style.color = layout.descriptionColor;
    }
    if (layout.iconColor) {
        document.querySelectorAll('.slink').forEach(el => el.style.color = layout.iconColor);
    }
    if (layout.backgroundColor) {
        const aboutInner = document.querySelector('.about-inner');
        if (aboutInner) aboutInner.style.backgroundColor = layout.backgroundColor;
    }

    // Hiệu ứng Glow
    if (layout.nameGlow) {
        const nameEl = document.querySelector('.hero-name');
        if (nameEl) nameEl.style.textShadow = layout.nameGlow;
    }
    if (layout.iconGlow) {
        document.querySelectorAll('.slink').forEach(el => el.style.filter = layout.iconGlow);
    }

    // Kích thước
    if (layout.avatarSize && layout.avatarSize !== 148) {
        const av = document.querySelector('.hero-av');
        if (av) { av.style.width = layout.avatarSize + 'px'; av.style.height = layout.avatarSize + 'px'; }
        const ring = document.querySelector('.hero-av-ring');
        if (ring) { ring.style.width = layout.avatarSize + 'px'; ring.style.height = layout.avatarSize + 'px'; }
        const img = document.querySelector('.hero-av-ring img');
        if (img) { img.style.width = (layout.avatarSize - 4) + 'px'; img.style.height = (layout.avatarSize - 4) + 'px'; }
        const dec = document.querySelector('.hero-av-dec');
        if (dec) {
            const decSize = Math.round(layout.avatarSize * 1.17);
            dec.style.width = decSize + 'px'; dec.style.height = decSize + 'px';
        }
    }
    if (layout.bioWidth && layout.bioWidth !== 760) {
        const inner = document.querySelector('.about-inner');
        if (inner) inner.style.maxWidth = layout.bioWidth + 'px';
    }
    if (layout.borderRadius !== undefined && layout.borderRadius !== 14) {
        document.querySelectorAll('.info-card').forEach(el => {
            el.style.borderRadius = layout.borderRadius + 'px';
        });
    }

    // Hiệu ứng chữ - handled by applyNameEffect() in updateUI()
    // Store config for later use
    window._layoutConfig = layout;

    // Font tùy chỉnh
    if (layout.customFontUrl && layout.customFontName) {
        const fontFace = new FontFace(layout.customFontName, 'url(' + layout.customFontUrl + ')');
        fontFace.load().then(function(font) {
            document.fonts.add(font);
            document.body.style.fontFamily = "'" + layout.customFontName + "', var(--f-sans)";
        }).catch(function(err) { console.warn('Font load failed:', err); });
    }

    // Hiệu ứng nền
    if (layout.bgEffect === 'plasma') {
        loadPlasmaEffect(layout.plasmaColor || '#5c5c5c', layout.plasmaSpeed || 0.5, layout.plasmaOpacity || 0.9);
    } else if (layout.bgEffect === 'particles') {
        loadParticlesEffect();
    } else if (layout.bgEffect === 'noise') {
        loadNoiseEffect();
    } else if (layout.bgEffect === 'rain') {
        loadRainEffect();
    }

    // Cursor effect
    if (layout.cursorEffect && layout.cursorEffect !== 'none') {
        loadCursorEffect(layout.cursorEffect);
    }

    // Animation
    if (layout.animationType === 'none') {
        document.querySelectorAll('.fin').forEach(el => {
            el.classList.add('v');
            el.style.transition = 'none';
        });
    }
}

// Plasma Effect - WebGL Shader
function loadPlasmaEffect(color, speed, opacity) {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:' + opacity + ';';
    canvas.id = 'plasma-canvas';
    document.body.appendChild(canvas);

    const gl = canvas.getContext('webgl');
    if (!gl) { console.warn('WebGL not supported'); return; }

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);

    // Parse hex color to RGB
    const hex = color.replace('#', '');
    const r = parseInt(hex.substring(0, 2), 16) / 255;
    const g = parseInt(hex.substring(2, 4), 16) / 255;
    const b = parseInt(hex.substring(4, 6), 16) / 255;

    const vertSrc = 'attribute vec2 a_position;void main(){gl_Position=vec4(a_position,0.0,1.0);}';
    const fragSrc = 'precision mediump float;uniform float u_time;uniform vec2 u_resolution;uniform vec3 u_color;void main(){vec2 uv=(gl_FragCoord.xy/u_resolution.xy)*2.0-1.0;uv.x*=u_resolution.x/u_resolution.y;float v=0.0;for(int i=0;i<3;i++){float fi=float(i);vec2 p=uv+vec2(cos(u_time*0.3+fi*1.5)*0.8,sin(u_time*0.4+fi*2.0)*0.6);v+=1.0/length(p)*0.05;}v=clamp(v,0.0,1.0);gl_FragColor=vec4(u_color*v,v*0.4);}';

    function createShader(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
    gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    const pos = gl.getAttribLocation(prog, 'a_position');
    gl.enableVertexAttribArray(pos);
    gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_resolution');
    const uColor = gl.getUniformLocation(prog, 'u_color');
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform3f(uColor, r, g, b);

    let startTime = Date.now();
    function render() {
        const elapsed = (Date.now() - startTime) / 1000 * speed;
        gl.uniform1f(uTime, elapsed);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
    }
    render();

    window.addEventListener('resize', function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform2f(uRes, canvas.width, canvas.height);
    });
}

let _nameEffectActive = false;

function applyNameEffect(effectType) {
    if (!effectType || effectType === 'none') return;
    const el = document.getElementById('uname');
    if (!el || !el.textContent.trim()) return;
    if (_nameEffectActive) return;
    
    _nameEffectActive = true;
    
    if (effectType === 'shine') {
        var text = el.textContent.trim();
        el.innerHTML = '';
        for (var i = 0; i < text.length; i++) {
            var span = document.createElement('span');
            span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
            span.style.display = 'inline-block';
            span.style.animation = 'namePulse 2s linear infinite';
            span.style.animationDelay = (i * 0.1) + 's';
            el.appendChild(span);
        }
    } else if (effectType === 'rainbow') {
        el.style.animation = 'nameNeon 4s ease-in-out infinite';
    } else if (effectType === 'glitch') {
        el.style.animation = 'nameGlitch 0.3s infinite';
    } else if (effectType === 'wave') {
        var text = el.textContent.trim();
        el.innerHTML = '';
        var spans = [];
        for (var i = 0; i < text.length; i++) {
            var span = document.createElement('span');
            span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
            span.style.display = 'inline-block';
            span.style.opacity = '0.5';
            el.appendChild(span);
            spans.push(span);
        }
        var totalChars = spans.length;
        var waves = [];
        function waveCreate() { waves.push({ position: 0, speed: 0.06 }); }
        function waveAnimate() {
            for (var i = waves.length - 1; i >= 0; i--) {
                waves[i].position += waves[i].speed;
                if (waves[i].position > totalChars + 3) waves.splice(i, 1);
            }
            for (var idx = 0; idx < spans.length; idx++) {
                var intensity = 0;
                for (var w = 0; w < waves.length; w++) {
                    var dist = Math.abs(idx - waves[w].position);
                    if (dist < 3) intensity += Math.cos((dist / 3) * Math.PI / 2);
                }
                intensity = Math.min(1, Math.max(0, intensity));
                spans[idx].style.opacity = (0.5 + intensity * 0.5).toString();
                spans[idx].style.transform = 'scale(' + (1 + intensity * 0.1) + ')';
                spans[idx].style.textShadow = intensity > 0 ? '0 0 ' + (intensity * 10) + 'px' : '';
            }
            requestAnimationFrame(waveAnimate);
        }
        waveCreate();
        waveAnimate();
        setInterval(waveCreate, 2000);
    } else if (effectType === 'typewrite') {
        var originalText = el.textContent.trim();
        var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*';
        var writeSpeed = 5;
        var eraseSpeed = 40;
        var scrambleDelay = 40;
        var scrambleFrames = 3;
        var loopDelay = 2500;
        async function scrambleCurrent(targetText) {
            for (var f = 0; f < scrambleFrames; f++) {
                var output = '';
                for (var i = 0; i < targetText.length; i++) {
                    if (Math.random() < 0.3) output += chars[Math.floor(Math.random() * chars.length)];
                    else output += targetText[i];
                }
                el.textContent = output;
                await new Promise(function(r) { setTimeout(r, scrambleDelay); });
            }
            el.textContent = targetText;
        }
        async function writeText(str) {
            var current = '';
            for (var i = 0; i < str.length; i++) {
                current += str[i];
                await scrambleCurrent(current);
                await new Promise(function(r) { setTimeout(r, writeSpeed); });
            }
        }
        async function eraseText() {
            var current = el.textContent;
            while (current.length > 0) {
                current = current.slice(0, -1);
                el.textContent = current;
                await new Promise(function(r) { setTimeout(r, eraseSpeed); });
            }
        }
        (async function typeLoop() {
            while (true) {
                await writeText(originalText);
                await new Promise(function(r) { setTimeout(r, loopDelay); });
                await eraseText();
                await new Promise(function(r) { setTimeout(r, 100); });
            }
        })();
    }
}

function loadCursorEffect(type){
    if(window._cursorEffectDestroy) { window._cursorEffectDestroy(); window._cursorEffectDestroy=null; }
    
    var defaultCanvas = document.getElementById('cc');
    if(defaultCanvas) defaultCanvas.style.display = 'none';
    
    if(!type || type === 'none') {
        // No cursor effect - ẩn default trail
        return;
    } else if(type === 'canvas') {
        // Canvas orbit lines effect (from zyo3 canvasCursor) - NO rain here
        (function(){
            var cvs=document.createElement('canvas');
            cvs.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:9991;';
            document.body.appendChild(cvs);
            var ctx2=cvs.getContext('2d');
            cvs.width=innerWidth-20;cvs.height=innerHeight;
            ctx2.running=true;ctx2.frame=1;
            var mouse={x:innerWidth/2,y:innerHeight/2};
            var trails=[];var color='#ffffff';
            function Trail(spring){this.spring=spring+Math.random()*0.1-0.02;this.friction=0.5+Math.random()*0.01-0.002;this.nodes=[];for(var i=0;i<50;i++){this.nodes.push({x:mouse.x,y:mouse.y,vx:0,vy:0});}}
            Trail.prototype.update=function(){var t=this.spring;var e=this.nodes[0];e.vx+=(mouse.x-e.x)*t;e.vy+=(mouse.y-e.y)*t;for(var i=0;i<this.nodes.length;i++){e=this.nodes[i];if(i>0){var n=this.nodes[i-1];e.vx+=(n.x-e.x)*t;e.vy+=(n.y-e.y)*t;e.vx+=n.vx*0.2;e.vy+=n.vy*0.2;}e.vx*=this.friction;e.vy*=this.friction;e.x+=e.vx;e.y+=e.vy;t*=0.98;}};
            Trail.prototype.draw=function(){var n=this.nodes[0].x,o=this.nodes[0].y;ctx2.beginPath();ctx2.moveTo(n,o);for(var i=1;i<this.nodes.length-2;i++){var a=this.nodes[i],b=this.nodes[i+1];n=(a.x+b.x)*0.5;o=(a.y+b.y)*0.5;ctx2.quadraticCurveTo(a.x,a.y,n,o);}var a=this.nodes[this.nodes.length-2],b=this.nodes[this.nodes.length-1];ctx2.quadraticCurveTo(a.x,a.y,b.x,b.y);ctx2.stroke();ctx2.closePath();};
            for(var i=0;i<20;i++){trails.push(new Trail(0.4+i/20*0.025));}
            var inited=false;
            function onMove(e){if(!inited){inited=true;}mouse.x=e.clientX||e.touches[0].pageX;mouse.y=e.clientY||e.touches[0].pageY;}
            document.addEventListener('mousemove',onMove);
            document.addEventListener('touchmove',function(e){if(e.touches.length>0)onMove(e.touches[0]);},{passive:true});
            function animate(){
                if(ctx2.running){
                    ctx2.globalCompositeOperation='source-over';
                    ctx2.clearRect(0,0,cvs.width,cvs.height);
                    ctx2.globalCompositeOperation='lighter';
                    var r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
                    ctx2.strokeStyle='rgba('+r+','+g+','+b+',0.2)';
                    ctx2.lineWidth=1;
                    for(var i=0;i<trails.length;i++){trails[i].update();trails[i].draw();}
                    ctx2.frame++;
                }
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize',function(){cvs.width=innerWidth-20;cvs.height=innerHeight;});
            window._canvasOrbitDestroy=function(){cvs.remove();document.removeEventListener('mousemove',onMove);};
        })();
        window._cursorEffectDestroy=function(){if(window._canvasOrbitDestroy)window._canvasOrbitDestroy();};
    } else if(type === 'bubble') {
        var canvas=document.createElement('canvas');

        canvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9990;';

        function animBubbles(){

async function initApp() {
    try {
        const res = await fetch('/api/config');
        if (res.ok) {
            const config = await res.json();
            if (config.USER_ID) USER_ID = config.USER_ID;
            if (config.BACKGROUND_URL !== undefined) BACKGROUND_URL = config.BACKGROUND_URL;
            if (config.BACKGROUND_BLUR !== undefined) BACKGROUND_BLUR = config.BACKGROUND_BLUR;
            if (BACKGROUND_URL || BACKGROUND_BLUR >= 0) window.applyBackground(BACKGROUND_URL);
            if (config.AVATAR_OVERRIDE !== undefined) AVATAR_OVERRIDE = config.AVATAR_OVERRIDE;
            if (config.AVATAR_DEC_OVERRIDE !== undefined) AVATAR_DEC_OVERRIDE = config.AVATAR_DEC_OVERRIDE;
            if (config.NAME_OVERRIDE !== undefined) NAME_OVERRIDE = config.NAME_OVERRIDE;
            // Update overlay name và title animation từ config
            const ovName = document.getElementById('ov-name');
            if (ovName) ovName.textContent = '@ ' + (NAME_OVERRIDE || 'bio').toLowerCase();
            tt = '@' + (NAME_OVERRIDE || 'bio').toLowerCase();
            ti = 0; td = false;
            if (config.CUSTOM_BIOS !== undefined) CUSTOM_BIOS = config.CUSTOM_BIOS;
            if (config.CUSTOM_SOCIALS) CUSTOM_SOCIALS = config.CUSTOM_SOCIALS;
            if (config.GUILD_INVITE !== undefined) GUILD_INVITE = config.GUILD_INVITE;
            if (config.MUSIC_RANDOM !== undefined) isMusicRandom = config.MUSIC_RANDOM;
            if (config.CUSTOM_MUSIC && config.CUSTOM_MUSIC.length > 0) {
                pl = config.CUSTOM_MUSIC;
                ci = isMusicRandom ? Math.floor(Math.random() * pl.length) : 0;
                loadTrack(ci, false);
            }
            
            // Áp dụng Layout customization (colors, effects, etc.)
            if (config.LAYOUT) applyLayout(config.LAYOUT);
            
            // Áp dụng Style config (nameColor, bioColor, iconColor, nameGlow)
            applyStyleConfig(config.STYLE);
        }
    } catch (e) { console.error('Failed to load config', e); }
    
    renderCustomSocials();
    fetchPresence();

    // Dùng Polling (cập nhật ngầm mỗi 15 giây) thay vì Socket.io để tương thích 100% với Vercel
    setInterval(async () => {
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const newConfig = await res.json();
                if (newConfig.USER_ID) USER_ID = newConfig.USER_ID;
                let bgChanged = false;
                if (newConfig.BACKGROUND_URL !== undefined && BACKGROUND_URL !== newConfig.BACKGROUND_URL) {
                    BACKGROUND_URL = newConfig.BACKGROUND_URL;
                    bgChanged = true;
                }
                if (newConfig.BACKGROUND_BLUR !== undefined && BACKGROUND_BLUR !== newConfig.BACKGROUND_BLUR) {
                    BACKGROUND_BLUR = newConfig.BACKGROUND_BLUR;
                    bgChanged = true;
                }
                if (bgChanged) window.applyBackground(BACKGROUND_URL);
                if (newConfig.AVATAR_OVERRIDE !== undefined) AVATAR_OVERRIDE = newConfig.AVATAR_OVERRIDE;
                if (newConfig.AVATAR_DEC_OVERRIDE !== undefined) AVATAR_DEC_OVERRIDE = newConfig.AVATAR_DEC_OVERRIDE;
                if (newConfig.NAME_OVERRIDE !== undefined) NAME_OVERRIDE = newConfig.NAME_OVERRIDE;
                if (newConfig.CUSTOM_BIOS !== undefined) CUSTOM_BIOS = newConfig.CUSTOM_BIOS;
                if (newConfig.CUSTOM_SOCIALS) CUSTOM_SOCIALS = newConfig.CUSTOM_SOCIALS;
                if (newConfig.MUSIC_RANDOM !== undefined) isMusicRandom = newConfig.MUSIC_RANDOM;
                if (newConfig.VIEWS_COUNT) { document.getElementById('views').textContent = newConfig.VIEWS_COUNT.toLocaleString(); }
                
                let musicChanged = false;
                if (newConfig.CUSTOM_MUSIC && newConfig.CUSTOM_MUSIC.length > 0) {
                    const oldPl = JSON.stringify(pl);
                    const newPl = JSON.stringify(newConfig.CUSTOM_MUSIC);
                    if (oldPl !== newPl) {
                        pl = newConfig.CUSTOM_MUSIC;
                        musicChanged = true;
                    }
                }
                renderCustomSocials();
                fetchPresence();
                if (musicChanged) {
                    ci = isMusicRandom ? Math.floor(Math.random() * pl.length) : 0;
                    loadTrack(ci, false);
                }
                
                // Re-apply layout and style on polling
                if (newConfig.LAYOUT) applyLayout(newConfig.LAYOUT);
                applyStyleConfig(newConfig.STYLE);
            }
        } catch (e) {}
    }, 15000);
}

initApp();
