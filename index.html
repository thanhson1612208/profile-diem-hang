<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aesthetic Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Inter:wght@300;400;600&display=swap');
        .font-aesthetic { font-family: 'Playfair Display', serif; }
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; }
        /* Hiệu ứng đĩa nhạc xoay chậm */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 8s linear infinite; }
    </style>
</head>
<body class="relative min-h-screen text-zinc-300 flex flex-col items-center justify-start py-16 px-4 overflow-x-hidden">

    <canvas id="snowCanvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

    <div class="relative z-10 w-full max-w-md flex flex-col items-center gap-6 text-center">
        
        <div class="relative w-28 h-28 rounded-full p-1 bg-gradient-to-b from-amber-200 via-yellow-400 to-transparent shadow-[0_0_20px_rgba(250,204,21,0.4)] mt-4">
            <img src="https://i.pinimg.com/736x/87/42/11/874211cb1e0bdfbdf60e15bc963b5fb3.jpg" class="w-full h-full object-cover rounded-full" alt="Avatar">
        </div>

        <h1 class="text-4xl font-aesthetic text-zinc-100 tracking-wide mt-2">kyle</h1>

        <div class="flex gap-4 text-zinc-500 text-sm my-1">
            <span>🌐 discord</span>
            <span>🎵 spotify</span>
        </div>

        <div class="w-full mt-2">
            <p class="text-xs tracking-widest text-zinc-500 uppercase font-semibold mb-1">About Me</p>
            <p class="font-aesthetic text-lg text-zinc-400 italic">"i miss u, i miss our dream, i miss everything..."</p>
        </div>

        <div class="w-full bg-zinc-900/50 backdrop-blur-md border border-zinc-800/60 rounded-2xl p-4 flex items-center gap-4 text-left shadow-lg">
            <div class="relative w-12 h-12 rounded-full bg-zinc-800 flex-shrink-0">
                <img src="https://i.pinimg.com/736x/87/42/11/874211cb1e0bdfbdf60e15bc963b5fb3.jpg" class="rounded-full w-full h-full" alt="Discord Status">
                <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-zinc-900 rounded-full"></div>
            </div>
            <div class="flex-1">
                <p class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold">Discord</p>
                <h2 class="text-sm font-semibold text-zinc-200">kyle</h2>
                <p class="text-xs text-zinc-400">do not disturb</p>
            </div>
        </div>

        <div class="w-full bg-zinc-900/50 backdrop-blur-md border border-zinc-800/60 rounded-2xl p-4 flex flex-col gap-3 shadow-lg">
            <div class="flex items-center gap-4 text-left">
                <img src="https://i.pinimg.com/736x/e2/a0/2d/e2a02d4d775626e23e0c06f74a001851.jpg" class="w-14 h-14 rounded-full object-cover animate-spin-slow border-2 border-zinc-700" alt="Vinyl">
                <div>
                    <p class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold">Now Playing</p>
                    <h3 class="text-sm font-semibold text-zinc-200">Tell Em - Instrumental</h3>
                    <p class="text-xs text-zinc-400">Cochise</p>
                </div>
            </div>
            <div class="w-full bg-zinc-800 h-1 rounded-full relative overflow-hidden">
                <div class="bg-zinc-400 h-full w-1/3 rounded-full"></div>
            </div>
            <div class="flex justify-between text-[10px] text-zinc-500">
                <span>1:51</span>
                <span>3:53</span>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Tạo danh sách các hạt tuyết
        const maxFlakes = 60; // Số lượng hạt tuyết trên màn hình cùng lúc
        const flakes = [];

        for (let i = 0; i < maxFlakes; i++) {
            flakes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 1, // Độ to nhỏ của hạt tuyết (1px - 4px)
                density: Math.random() * maxFlakes,
                opacity: Math.random() * 0.6 + 0.2 // Độ mờ ảo của hạt
            });
        }

        // Hàm vẽ và làm tuyết rơi chuyển động
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            flakes.forEach(flake => {
                ctx.beginPath();
                // Tạo màu trắng mờ cho tuyết
                ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
                // Vẽ hạt tuyết hình tròn
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2, true);
                ctx.fill();

                // Cập nhật vị trí để hạt tuyết rơi xuống và đung đưa qua lại
                flake.y += Math.random() * 1 + 0.5; // Tốc độ rơi chậm rãi
                flake.x += Math.sin(flake.density) * 0.5; // Đung đưa sang trái/phải bằng hàm Sin
                flake.density += 0.01;

                // Nếu hạt tuyết rơi quá đáy màn hình thì cho xuất hiện lại ở trên đỉnh
                if (flake.y > canvas.height) {
                    flake.y = -10;
                    flake.x = Math.random() * canvas.width;
                }
                // Nếu trôi quá lề màn hình
                if (flake.x > canvas.width || flake.x < 0) {
                    flake.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(drawSnow);
        }

        // Bắt đầu chạy hiệu ứng
        drawSnow();
    </script>
</body>
</html>
