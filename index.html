<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>@ kyle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#111111;
      --text:#d4d4d4;
      --dim:rgba(255,255,255,0.45);
      --dimmer:rgba(255,255,255,0.08);
      --card:rgba(30,30,30,0.75);
      --border:rgba(255,255,255,0.07);
      --gold:#c9a84c;
      --serif:'EB Garamond',serif;
      --mono:'Space Mono',monospace;
    }
    html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--serif);overflow-x:hidden}

    /* ─── LOADING ─── */
    #loading{
      position:fixed;inset:0;z-index:9999;
      background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
      cursor:pointer;
      transition:opacity .8s ease;
    }
    #loading.fade-out{opacity:0;pointer-events:none}
    .load-name{
      font-family:var(--mono);font-size:13px;letter-spacing:.45em;color:rgba(255,255,255,0.25);
      text-transform:lowercase;
    }
    .load-ring{
      width:60px;height:60px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.12);
      border-top-color:rgba(255,255,255,0.5);
      animation:spin 1.4s linear infinite;
    }
    .load-hint{
      font-family:var(--mono);font-size:11px;letter-spacing:.25em;color:rgba(255,255,255,0.2);
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── RAIN CANVAS ─── */
    #rain-canvas{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      opacity:.55;
    }

    /* ─── BG ─── */
    #bg{
      position:fixed;inset:0;z-index:0;
      background:#111 center/cover no-repeat;
      transition:background-image .6s;
    }
    #bg::after{
      content:'';position:absolute;inset:0;
      background:rgba(0,0,0,0.45);
    }
    #bg-vid{
      position:fixed;inset:0;z-index:0;
      width:100%;height:100%;object-fit:cover;display:none;
    }

    /* ─── PAGE ─── */
    #page{
      position:relative;z-index:10;
      display:flex;flex-direction:column;align-items:center;
      padding:0 0 160px;
      min-height:100vh;
      opacity:0;transition:opacity .8s ease .2s;
    }
    #page.visible{opacity:1}

    /* ─── HERO ─── */
    #hero{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;
      padding:40px 20px;
      text-align:center;
    }

    /* ─── AVATAR ─── */
    .av-wrap{
      position:relative;width:130px;height:130px;
      margin-bottom:28px;
    }
    /* golden halo above */
    .av-halo{
      position:absolute;top:-18px;left:50%;transform:translateX(-50%);
      width:90px;height:22px;
      background:radial-gradient(ellipse 80% 60% at 50% 60%, rgba(255,210,60,0.9) 0%, rgba(201,168,76,0.5) 50%, transparent 100%);
      filter:blur(3px);
      animation:halo-pulse 3s ease-in-out infinite;
      z-index:3;
    }
    .av-halo-ring{
      position:absolute;top:-10px;left:50%;transform:translateX(-50%);
      width:80px;height:14px;
      border-radius:50%;
      border:2px solid rgba(255,200,50,0.7);
      box-shadow:0 0 12px rgba(255,200,50,0.5),0 0 4px rgba(255,200,50,0.8) inset;
      animation:halo-pulse 3s ease-in-out infinite;
      z-index:3;
    }
    @keyframes halo-pulse{
      0%,100%{opacity:.7;transform:translateX(-50%) scaleX(1)}
      50%{opacity:1;transform:translateX(-50%) scaleX(1.05)}
    }
    /* sparkles */
    .sparkle{
      position:absolute;width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,0.9);
      box-shadow:0 0 6px 2px rgba(255,255,200,0.8);
      animation:sparkle-anim 2s ease-in-out infinite;
      z-index:4;
    }
    .sparkle:nth-child(2){top:10px;left:-6px;animation-delay:.4s;width:4px;height:4px}
    .sparkle:nth-child(3){top:20px;right:-8px;animation-delay:.8s;width:5px;height:5px}
    .sparkle:nth-child(4){bottom:14px;left:-10px;animation-delay:1.2s;width:4px;height:4px}
    .sparkle:nth-child(5){bottom:8px;right:-5px;animation-delay:1.6s;width:3px;height:3px}
    @keyframes sparkle-anim{
      0%,100%{opacity:0;transform:scale(.5)}
      50%{opacity:1;transform:scale(1)}
    }

    .av-border{
      position:absolute;inset:-3px;border-radius:50%;
      background:conic-gradient(
        rgba(255,255,255,0.95) 0deg,
        rgba(200,200,200,0.5) 90deg,
        rgba(255,255,255,0.9) 180deg,
        rgba(150,150,150,0.4) 270deg,
        rgba(255,255,255,0.95) 360deg
      );
      animation:border-spin 8s linear infinite;
      z-index:1;
    }
    @keyframes border-spin{to{transform:rotate(360deg)}}

    .av-border-inner{
      position:absolute;inset:2px;border-radius:50%;
      background:var(--bg);z-index:2;
    }
    .av-img{
      position:absolute;inset:3px;border-radius:50%;z-index:3;
      object-fit:cover;width:calc(100% - 6px);height:calc(100% - 6px);
    }
    .av-status{
      position:absolute;bottom:5px;right:5px;z-index:5;
      width:18px;height:18px;border-radius:50%;
      background:#747f8d;
      border:3px solid var(--bg);
    }
    .av-status.online {background:#3ba55c}
    .av-status.idle   {background:#faa81a}
    .av-status.dnd    {background:#ed4245}

    /* ─── NAME ─── */
    .hero-name{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;font-weight:300;
      font-size:52px;color:#fff;
      letter-spacing:.02em;
      margin-bottom:22px;
      text-shadow:0 0 40px rgba(255,255,255,0.15);
    }
    .hero-icons{
      display:flex;gap:18px;align-items:center;justify-content:center;
    }
    .hero-icon{
      width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.1);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .2s;text-decoration:none;color:var(--dim);
    }
    .hero-icon:hover{background:rgba(255,255,255,0.12);color:#fff}
    .hero-icon svg{width:16px;height:16px}

    /* ─── SCROLL DOWN ─── */
    .scroll-line{
      margin-top:48px;
      width:1px;height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation:scroll-grow 2s ease-in-out infinite;
    }
    @keyframes scroll-grow{
      0%,100%{height:40px;opacity:.4}
      50%{height:70px;opacity:.8}
    }

    /* ─── CONTENT SECTIONS ─── */
    #content{
      width:100%;max-width:460px;
      padding:0 16px;
      display:flex;flex-direction:column;
      gap:0;
    }

    /* About me */
    .about-section{
      text-align:center;
      padding:60px 0 50px;
    }
    .about-label{
      font-family:var(--mono);font-size:9px;
      letter-spacing:.3em;color:rgba(255,255,255,0.25);
      text-transform:uppercase;margin-bottom:20px;
    }
    .about-text{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;font-size:19px;
      color:rgba(255,255,255,0.55);
      line-height:1.7;
      letter-spacing:.01em;
    }

    /* ─── CARD BASE ─── */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      padding:16px;
      margin-bottom:12px;
      animation:fadeUp .5s ease both;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
    .card-tag{
      font-family:var(--mono);font-size:9px;
      letter-spacing:.2em;color:rgba(255,255,255,0.3);
      text-transform:uppercase;margin-bottom:12px;
    }

    /* ─── DISCORD CARD ─── */
    .dc-row{display:flex;gap:12px;align-items:center}
    .dc-av{
      width:56px;height:56px;border-radius:50%;
      object-fit:cover;flex-shrink:0;
      background:rgba(255,255,255,0.05);
    }
    .dc-info{flex:1;min-width:0}
    .dc-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .dc-name{font-family:var(--serif);font-size:18px;font-weight:500;color:#fff}
    .dc-add-btn{
      width:22px;height:22px;border-radius:4px;
      background:rgba(255,255,255,0.1);
      border:none;cursor:pointer;color:var(--dim);
      display:flex;align-items:center;justify-content:center;
    }
    .dc-add-btn svg{width:12px;height:12px}
    .dc-status-text{
      font-family:var(--mono);font-size:10px;
      color:rgba(255,255,255,0.35);margin-bottom:8px;
    }
    .dc-badges{display:flex;gap:5px;flex-wrap:wrap}
    .dc-badge{
      width:20px;height:20px;border-radius:4px;
      object-fit:contain;flex-shrink:0;
    }
    /* fallback colored dots for badges */
    .badge-dot{
      width:20px;height:20px;border-radius:5px;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;
    }

    /* ─── SPOTIFY CARD ─── */
    .sp-row{display:flex;gap:12px;align-items:center}
    .sp-art{
      width:56px;height:56px;border-radius:8px;
      object-fit:cover;flex-shrink:0;
      background:rgba(255,255,255,0.05);
    }
    .sp-info{flex:1;min-width:0}
    .sp-song{font-family:var(--serif);font-size:17px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sp-artist{font-size:13px;color:rgba(255,255,255,0.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--serif)}
    .sp-album{font-size:12px;color:rgba(255,255,255,0.3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--serif)}

    /* ─── MUSIC PLAYER (BOTTOM) ─── */
    #player{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      background:rgba(12,12,12,0.88);
      border-top:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(24px);
      padding:14px 20px 20px;
      cursor:grab;user-select:none;
    }
    #player:active{cursor:grabbing}

    .pl-label{
      font-family:var(--mono);font-size:8px;letter-spacing:.3em;
      color:rgba(255,255,255,0.2);text-transform:uppercase;
      margin-bottom:10px;text-align:center;
    }
    .pl-row{display:flex;gap:14px;align-items:center}
    .pl-art{
      width:44px;height:44px;border-radius:8px;
      object-fit:cover;flex-shrink:0;
      background:rgba(255,255,255,0.06);
    }
    .pl-info{flex:1;min-width:0}
    .pl-title{font-family:var(--serif);font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pl-artist{font-size:12px;color:rgba(255,255,255,0.35);margin-top:1px;font-family:var(--serif)}
    .pl-controls{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .pl-btn{
      background:none;border:none;color:rgba(255,255,255,0.6);
      cursor:pointer;padding:5px;transition:color .2s;
      display:flex;align-items:center;
    }
    .pl-btn:hover{color:#fff}
    .pl-btn svg{width:18px;height:18px}
    .pl-play{
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.2);
      display:flex;align-items:center;justify-content:center;
      color:#fff;cursor:pointer;transition:background .2s;
    }
    .pl-play:hover{background:rgba(255,255,255,0.22)}
    .pl-play svg{width:16px;height:16px}

    .pl-progress-wrap{margin-top:12px}
    .pl-bar{
      width:100%;height:2px;background:rgba(255,255,255,0.1);
      border-radius:1px;cursor:pointer;position:relative;
    }
    .pl-bar-fill{
      height:100%;background:rgba(255,255,255,0.7);
      border-radius:1px;pointer-events:none;
      transition:width .3s linear;
    }
    .pl-times{
      display:flex;justify-content:space-between;
      margin-top:5px;
      font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.25);
    }
    .pl-vol{
      display:flex;align-items:center;gap:8px;margin-top:8px;
    }
    .pl-vol svg{width:13px;height:13px;color:rgba(255,255,255,0.3);flex-shrink:0}
    .pl-vol input{flex:1;accent-color:rgba(255,255,255,0.6);cursor:pointer}

    audio{display:none}

    /* scrollbar */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

    @media(max-width:480px){
      .hero-name{font-size:44px}
      #content{max-width:100%}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading" onclick="startPage()">
  <div class="load-name">@ &nbsp; k y l e</div>
  <div class="load-ring"></div>
  <div class="load-hint">[ &nbsp; click to start &nbsp; ]</div>
</div>

<!-- BACKGROUND -->
<div id="bg"></div>
<video id="bg-vid" autoplay loop muted playsinline><source id="bg-vid-src" src=""/></video>

<!-- RAIN CANVAS -->
<canvas id="rain-canvas"></canvas>

<!-- PAGE -->
<div id="page">

  <!-- HERO -->
  <section id="hero">
    <div class="av-wrap">
      <!-- halo -->
      <div class="av-halo"></div>
      <div class="av-halo-ring"></div>
      <!-- sparkles -->
      <div class="sparkle" style="top:8px;left:-8px"></div>
      <div class="sparkle" style="top:18px;right:-10px"></div>
      <div class="sparkle" style="bottom:12px;left:-12px"></div>
      <div class="sparkle" style="bottom:6px;right:-7px"></div>
      <!-- border -->
      <div class="av-border"></div>
      <div class="av-border-inner"></div>
      <img class="av-img" id="av-img" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar"/>
      <div class="av-status" id="av-status"></div>
    </div>

    <div class="hero-name" id="hero-name">kyle</div>

    <div class="hero-icons">
      <a class="hero-icon" href="https://discord.gg/zc6Hvkpn" target="_blank" title="Discord">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
      </a>
      <a class="hero-icon" href="#" id="sp-link" title="Spotify">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      </a>
    </div>

    <div class="scroll-line"></div>
  </section>

  <!-- CONTENT -->
  <div id="content">

    <!-- ABOUT ME -->
    <div class="about-section">
      <div class="about-label">About Me</div>
      <div class="about-text" id="about-text">i miss u, i miss our dream, i miss everything about you...</div>
    </div>

    <!-- DISCORD CARD -->
    <div class="card" id="dc-card">
      <div class="card-tag">Discord</div>
      <div class="dc-row">
        <img class="dc-av" id="dc-av" src="https://cdn.discordapp.com/embed/avatars/0.png" alt=""/>
        <div class="dc-info">
          <div class="dc-name-row">
            <span class="dc-name" id="dc-name">kyle</span>
            <button class="dc-add-btn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
          </div>
          <div class="dc-status-text" id="dc-status-text">offline</div>
          <div class="dc-badges" id="dc-badges">
            <div class="badge-dot" style="background:rgba(88,101,242,0.3)" title="Discord">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="rgba(88,101,242,0.9)"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SPOTIFY CARD -->
    <div class="card" id="sp-card" style="display:none">
      <div class="card-tag">Listening to Spotify</div>
      <div class="sp-row">
        <img class="sp-art" id="sp-art" src="" alt=""/>
        <div class="sp-info">
          <div class="sp-song" id="sp-song">—</div>
          <div class="sp-artist" id="sp-artist"></div>
          <div class="sp-album" id="sp-album"></div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /page -->

<!-- MUSIC PLAYER -->
<div id="player">
  <audio id="audio" preload="metadata"></audio>
  <div class="pl-label">Now Playing</div>
  <div class="pl-row">
    <img class="pl-art" id="pl-art" src="" alt=""/>
    <div class="pl-info">
      <div class="pl-title" id="pl-title">—</div>
      <div class="pl-artist" id="pl-artist"></div>
    </div>
    <div class="pl-controls">
      <button class="pl-btn" onclick="prevTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <div class="pl-play" id="pl-play" onclick="togglePlay()">
        <svg id="pl-play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <button class="pl-btn" onclick="nextTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8.5-6L21 6v12z"/></svg>
      </button>
      <button class="pl-btn" id="pl-vol-btn" onclick="toggleMute()" style="margin-left:4px">
        <svg id="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </button>
    </div>
  </div>
  <div class="pl-progress-wrap">
    <div class="pl-bar" id="pl-bar" onclick="seekAudio(event)">
      <div class="pl-bar-fill" id="pl-fill" style="width:0%"></div>
    </div>
    <div class="pl-times">
      <span id="pl-cur">0:00</span>
      <span id="pl-dur">0:00</span>
    </div>
  </div>
  <div class="pl-vol">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" min="0" max="100" value="70" id="vol-range" oninput="setVol(this.value)"/>
  </div>
</div>

// Background

<script>
// ── CONFIG ──
const DISCORD_ID = "1131176637501804544"; // ← thay ID Discord của bạn

// ── LOADING ──
function startPage(){
  const l = document.getElementById("loading");
  l.classList.add("fade-out");
  setTimeout(()=>{
    l.style.display="none";
    document.getElementById("page").classList.add("visible");
    initRain();
    connectLanyard();
  }, 800);
}

// ── RAIN ──
function initRain(){
  const canvas = document.getElementById("rain-canvas");
  const ctx = canvas.getContext("2d");
  let drops = [];

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    drops = [];
    const count = Math.floor(canvas.width / 18);
    for(let i=0;i<count;i++){
      drops.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        len: Math.random()*18+8,
        speed: Math.random()*2.5+1.5,
        opacity: Math.random()*.35+.08,
        width: Math.random()*.8+.3
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drops.forEach(d=>{
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len*0.18, d.y + d.len);
      ctx.strokeStyle = `rgba(180,200,220,${d.opacity})`;
      ctx.lineWidth = d.width;
      ctx.stroke();
      d.y += d.speed;
      d.x -= d.speed * 0.18;
      if(d.y > canvas.height + d.len){
        d.y = -d.len;
        d.x = Math.random()*canvas.width;
      }
    });
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener("resize", resize);
  draw();
}

// ── LANYARD ──
function connectLanyard(){
  const ws = new WebSocket("wss://api.lanyard.rest/socket");
  let hb;
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if(msg.op===1){
      ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));
      hb = setInterval(()=>ws.send(JSON.stringify({op:3})), msg.d.heartbeat_interval);
    }
    if(msg.op===0) applyLanyard(msg.d);
  };
  ws.onclose = ()=>{ clearInterval(hb); setTimeout(connectLanyard,3000); };
}

function applyLanyard(d){
  const u = d.discord_user;
  // avatar
  const avUrl = u.avatar
    ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${u.avatar.startsWith("a_")?"gif":"png"}?size=256`
    : `https://cdn.discordapp.com/embed/avatars/${(BigInt(u.id)>>22n)%6n}.png`;
  document.getElementById("av-img").src = avUrl;
  document.getElementById("dc-av").src  = avUrl;

  // name
  const name = u.global_name || u.username;
  document.getElementById("hero-name").textContent = name;
  document.getElementById("dc-name").textContent   = name;

  // status dot
  const dotClass = {online:"online",idle:"idle",dnd:"dnd",offline:""}[d.discord_status]||"";
  const dot = document.getElementById("av-status");
  dot.className = "av-status " + dotClass;

  // status text
  const statusMap={online:"online",idle:"idle",dnd:"do not disturb",offline:"offline"};
  document.getElementById("dc-status-text").textContent = statusMap[d.discord_status]||"offline";

  // spotify
  const sp = d.spotify;
  const spCard = document.getElementById("sp-card");
  if(sp){
    spCard.style.display="block";
    document.getElementById("sp-song").textContent   = sp.song||"—";
    document.getElementById("sp-artist").textContent = sp.artist||"";
    document.getElementById("sp-album").textContent  = sp.album||"";
    if(sp.album_art_url) document.getElementById("sp-art").src = sp.album_art_url;
  } else { spCard.style.display="none"; }
}

// ── MUSIC PLAYER ──
window._pl = [];
window._pi = 0;
const audio = document.getElementById("audio");

function loadTrack(i){
  const t = window._pl[i]; if(!t) return;
  audio.src = t.url;
  document.getElementById("pl-title").textContent  = t.title||"Unknown";
  document.getElementById("pl-artist").textContent = t.artist||"";
  document.getElementById("pl-art").src = t.cover||"https://via.placeholder.com/44x44/111/444?text=♪";
  audio.volume = document.getElementById("vol-range").value/100;
}

function togglePlay(){
  if(audio.paused){
    audio.play().catch(()=>{});
    document.getElementById("pl-play-icon").innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    audio.pause();
    document.getElementById("pl-play-icon").innerHTML='<path d="M8 5v14l11-7z"/>';
  }
}
function nextTrack(){
  window._pi=(window._pi+1)%Math.max(1,window._pl.length);
  loadTrack(window._pi); audio.play().catch(()=>{});
}
function prevTrack(){
  window._pi=(window._pi-1+Math.max(1,window._pl.length))%Math.max(1,window._pl.length);
  loadTrack(window._pi); audio.play().catch(()=>{});
}
function seekAudio(e){
  if(!audio.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}
function setVol(v){ audio.volume=v/100; }
let muted=false;
function toggleMute(){
  muted=!muted; audio.muted=muted;
  document.getElementById("vol-icon").style.opacity=muted?.3:1;
}

audio.addEventListener("timeupdate",()=>{
  if(!audio.duration) return;
  document.getElementById("pl-fill").style.width=(audio.currentTime/audio.duration*100)+"%";
  document.getElementById("pl-cur").textContent=fmt(audio.currentTime);
  document.getElementById("pl-dur").textContent=fmt(audio.duration);
});
audio.addEventListener("ended", nextTrack);

function fmt(s){
  if(isNaN(s)) return "0:00";
  return Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,"0");
}

// ── PLAYER DRAG ──
(()=>{
  const el=document.getElementById("player");
  let drag=false,ox=0,oy=0;
  el.addEventListener("mousedown",e=>{
    if(e.target.closest("button,input,.pl-play,.pl-bar")) return;
    drag=true;
    const r=el.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    el.style.bottom="auto"; el.style.left=r.left+"px"; el.style.top=r.top+"px";
    el.style.transition="none";
  });
  document.addEventListener("mousemove",e=>{
    if(!drag) return;
    el.style.left=(e.clientX-ox)+"px";
    el.style.top=(e.clientY-oy)+"px";
  });
  document.addEventListener("mouseup",()=>drag=false);

  el.addEventListener("touchstart",e=>{
    if(e.target.closest("button,input,.pl-play,.pl-bar")) return;
    drag=true;
    const r=el.getBoundingClientRect(), t=e.touches[0];
    ox=t.clientX-r.left; oy=t.clientY-r.top;
    el.style.bottom="auto"; el.style.left=r.left+"px"; el.style.top=r.top+"px";
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!drag) return;
    const t=e.touches[0];
    el.style.left=(t.clientX-ox)+"px"; el.style.top=(t.clientY-oy)+"px";
  },{passive:true});
  document.addEventListener("touchend",()=>drag=false);
})();
</script>
